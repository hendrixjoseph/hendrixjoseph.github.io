message: >-
  Interestingly enough I got my regular monthly email yesterday from Arcadia
  stating:


  > No action is needed! Each month Arcadia will manage billing and payments
  with your utility so you do not have to pay them directly. You will be
  automatically charged on Mar 18, 2026.


  I'll have to pay attention and see if Arcadia does in fact charge me, and if
  so, they remit payment to my utility company.
